<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./styles/global.css" />
    <link rel="stylesheet" href="./styles/header.css" />
    <link rel="stylesheet" href="./styles/footer.css" />
    <script type="module" src="./js/main.js" defer></script>
    <script src="js/sharedCollection.js" defer></script>
    <title>Delade samlingar</title>
  </head>
  <body>
    <header id="headerContainer"></header>
    <main>
      <h2>Delade samlingar</h2>
      <div class='container'>
        <div>
            <label class="label" for="categories"
              >Välj kategori du vill söka på</label
            >
            <div class="input-div flex-row">
              <select class="select" name="category" id="category">
                <option value="1">Historia</option>
                <option value="2">Matematik</option>
                <option value="3">Geografi</option>
                <option value="4">Psykologi</option>
                <option value="5">Biologi</option>
                <option value="6">Kemi</option>
                <option value="7">UXD</option>
                <option value="8">Fysik</option>
              </select>
              <span class="unicode">&#x2335;</span>
            </div>
          </div>
        <div class='flex-column'>
          <h3>Extra tillval</h3>
        <div class='flex-row'>
           <input class="checkbox" checked name='checkbox-quiz' type='checkbox' value='flashcard'>Flashcard
         </div>
         <div class='flex-row'>
               <input class="checkbox" checked name='checkbox-quiz' type='checkbox' value='flashcard'>Quiz
         </div>
      </div>
      <div id='render-collections'>
         <button>

         </button>
      </div>
    </main>
    <footer id="footerContainer"></footer>
  </body>
</html>
