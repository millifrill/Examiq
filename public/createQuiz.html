<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script type="module" src="./js/main.js"></script>
    <script type="module" src="./js/createQuiz.js"></script>
    <link rel="stylesheet" href="./styles/global.css" />
    <link rel="stylesheet" href="./styles/header.css" />
    <link rel="stylesheet" href="./styles/footer.css" />
    <link rel="stylesheet" href="./styles/createQuiz.css" />
    <title>Create Quiz</title>
  </head>

  <body>
    <header id="headerContainer"></header>
    <main>
      <div class="create-quiz-container">
        <h2>Skapa quiz samling</h2>

        <div class="collection-info">
          <div class="section1">
            <div class="svg-select-container">
              <button
                title="Ändra kategori"
                class="svg-select-button input"
              ></button>
              <div class="svgOptions"></div>
            </div>
            <div>
              <input
                class="collection-name-textbox input"
                type="text"
                placeholder="Samlingsnamn"
              />
            </div>
          </div>
          <button
            title="Lägg till ny samnling"
            class="create-collection-button"
          >
            <svg
              xmlns="http://www.w3.org/2000/svg"
              fill="none"
              viewBox="0 0 24 24"
              stroke-width="1.5"
              stroke="currentColor"
              class="size-6"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                d="M12 4.5v15m7.5-7.5h-15"
              />
            </svg>
          </button>
        </div>
        <p class="collection-out info-message"></p>

        <div class="select-collection-info">Välj en samling att redigera</div>
        <select name="Samling" id="Select-Collection">
          <option value="">Välj samling att redigera</option>
        </select>
        <div class="input-section">
          <div class="selected-collection-text">Ingen vald</div>
          <div class="shareQuizCheckbox">
            <input id="shareCollection" type="checkbox" />
            <label for="shareColletion">Dela samling</label>
          </div>

          <div class="add-question-text">
            <div>Lägg till fråga i samling</div>
            <div>
              <select class="cardSelect">
                <option value="10">Test</option>
              </select>
            </div>
          </div>

          <!-- <div class="shadows">
          <div class="shadowbox"></div>
        <div class="shadowboxtwo"></div>
      </div> -->

          <textarea
            class="question-box textarea"
            type="text"
            placeholder="Fråga..."
          ></textarea>
          <input
            id="correctAnswer"
            class="answer input"
            type="text"
            placeholder="Rätt svar..."
          />
          <input
            class="answer input optionone"
            type="text"
            placeholder="Alternativ..."
          />
          <input
            class="answer input optiontwo"
            type="text"
            placeholder="Alternativ..."
          />
          <input
            class="answer input optionthree"
            type="text"
            placeholder="Alternativ..."
          />
          <div class="buttons-container">
            <button class="deleteButton button">Radera fråga</button>
            <button class="addButton button">Lägg till</button>
          </div>
          <div class="quiestions-out">
            <p class="quizMessageOut"></p>
          </div>
        </div>
        <!-- <button class="completeButton button">Slutför Samling</button> -->
      </div>
    </main>
    <footer id="footerContainer"></footer>
  </body>
</html>
