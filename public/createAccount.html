<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script type="module" src="./js/main.js"></script>
    <script type="module" src="js/auth.js"></script>
    <link rel="stylesheet" href="styles/global.css" />
    <link rel="stylesheet" href="styles/auth.css" />
    <link rel="stylesheet" href="./styles/header.css" />
    <link rel="stylesheet" href="./styles/footer.css" />
    <title>Skapa konto</title>
  </head>
  <body>
    <header id="headerContainer"></header>
    <main>
      <div class="container">
        <h2>Skapa konto</h2>
        <div>
          <form id="registerForm" action="" autocomplete="off" novalidate>
            <label class="label" for="username">Användarnamn</label>
            <input
              class="input"
              type="text"
              id="username"
              name="username"
              minlength="2"
              placeholder="Ange ditt användarnamn"
              required
            />
            <label class="label" for="username">Email</label>
            <input
              class="input"
              type="email"
              id="email"
              name="email"
              placeholder="Ange email"
              required
            />
            <label class="label" for="password1">Lösenord</label>
            <div class="input-div">
              <input
                class="toggle-password1"
                placeholder="Ange lösenord"
                type="password"
                id="password1"
                name="password"
                minlength="10"
                maxlength="20"
                required
              />
              <img
                src="./img/eye-closed.svg"
                class="eye-icon1"
                alt="Öga blundar"
              />
            </div>
            <label class="label" for="password2">Lösenord igen</label>
            <div class="input-div">
              <input
                class="toggle-password2"
                placeholder="Ange lösenord igen"
                type="password"
                id="password2"
                name="password2"
                minlength="10"
                maxlength="20"
                required
              />
              <img
                src="./img/eye-closed.svg"
                class="eye-icon2"
                alt="Öga blundar"
              />
            </div>
            <p class="error-message"></p>
            <button class="create-account-btn button" type="submit">
              Skapa konto
            </button>
            <div class="checkbox">
              <input
                class="checkbox"
                type="checkbox"
                id="privacy-policy"
                name="privacy-policy"
              />
              <label class="small-label" for="privacy-policy">
                Jag godkänner behandling av mina personuppgifter enligt
                <a href="privacyPolicy.html" style="color: #187692"
                  >integritetspolicyn</a
                >.</label
              >
            </div>
          </form>
        </div>
      </div>
    </main>
    <footer id="footerContainer"></footer>
  </body>
</html>
