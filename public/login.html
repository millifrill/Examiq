<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script type="module" src="./js/main.js" defer></script>
    <script src="js/auth.js" defer></script>
    <link rel="stylesheet" href="styles/global.css" />
    <link rel="stylesheet" href="styles/auth.css" />
    <link rel="stylesheet" href="./styles/header.css" />
    <link rel="stylesheet" href="./styles/footer.css" />
    <title>Login</title>
  </head>
  <body>
    <header id="headerContainer"></header>
    <main>
      <div class="container">
        <h2>Login</h2>
        <div>
          <form id="loginForm" action="" autocomplete="off">
            <label class="label" for="username">Användarnamn</label>
            <input
              class="input"
              type="text"
              id="username"
              name="username"
              placeholder="Ange ditt användarnamn"
              required
            />
            <label class="label" for="password">Lösenord</label>
            <div class="input-div">
              <input
                class="toggle-password"
                type="password"
                id="password1"
                name="password"
                placeholder="Ange ditt lösenord"
                required
              />
              <img
                src="./img/eye-closed.svg"
                class="eye-icon"
                alt="Öga blundar"
              />
            </div>
            <button class="button" type="submit">Logga in</button>
            <p id="create-accout-p">
              Har du inget konto?<a id="create-accout" href="createAccount.html"
                >Skapa konto</a
              >
            </p>
            <p class="error-message"></p>
          </form>
        </div>
      </div>
    </main>
    <footer id="footerContainer"></footer>
  </body>
</html>
