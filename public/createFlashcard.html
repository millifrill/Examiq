<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script type="module" src="./js/main.js" defer></script>
    <script src="./js/createFlashcard.js" defer></script>
    <link rel="stylesheet" href="./styles/global.css" />
    <link rel="stylesheet" href="./styles/header.css" />
    <link rel="stylesheet" href="./styles/footer.css" />
    <link rel="stylesheet" href="./styles/createFlashcard.css" />
    <title>Document</title>
  </head>

  <body>
    <header id="headerContainer"></header>
    <main>
      <div class="container">
        <h2>Skapa Flashcard</h2>
        <form id="flashcard-form" action="" autocomplete="off">
          <label class="label" for="collection-name">Namnge samlingen</label>
          <input
            class="input"
            type="text"
            id="collection-name"
            name="collection-name"
            placeholder="Ange samlingens namn"
          />
          <div>
            <label class="label" for="categories"
              >Välj kategori för samlingen</label
            >
            <div class="input-div flex-row">
              <select class="select" name="category" id="category">
                <option value="1">Historia</option>
                <option value="2">Matematik</option>
                <option value="3">Geografi</option>
                <option value="4">Psykologi</option>
                <option value="5">Biologi</option>
                <option value="6">Kemi</option>
                <option value="7">UXD</option>
                <option value="8">Fysik</option>
              </select>
              <span class="unicode">&#x2335;</span>
            </div>
          </div>
          <div class="checkbox-div">
            <input
              class="checkbox"
              type="checkbox"
              id="public"
              name="public"
              checked
            />
            <label class="" for="public"> Publicera publikt</label>
          </div>
          <button class="create-collection-btn button">Skapa samling</button>
          <label class="label" for="select-collections">Välj samling</label>
          <div class="input-div flex-row">
            <select
              class="select"
              name="select-collections"
              id="select-collections"
            >
              <option value="">Välj en samling</option>
            </select>
            <span class="unicode get-collections">&#x2335;</span>
          </div>
          <div class="flashcards-div"></div>
          <p class="error-message"></p>
          <p class="info-message"></p>
          <div class="add-icon-div">
            <button class="white-button add-flashcard" href="flashcard.html">
              Lägg till ett nytt kort
              <img class="add-icon" src="./img/add.svg" />
            </button>
          </div>
          <a type="button" class="button" href="index.html">
            Tillbaka till startsidan
          </a>
        </form>
      </div>
    </main>
    <footer id="footerContainer"></footer>
  </body>
</html>
