<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script type="module" src="./js/main.js"></script>
    <script src="./js/header.js" defer></script>
    <script type="module" src="./js/profile.js"></script>
    <link rel="stylesheet" href="./styles/global.css" />
    <link rel="stylesheet" href="./styles/header.css" />
    <link rel="stylesheet" href="./styles/footer.css" />
    <link rel="stylesheet" href="./styles/profile.css" />
    <title>Profil</title>
  </head>
  <body>
    <header id="headerContainer"></header>
    <main>
      <h2>Profil</h2>
      <div class="container">
        <div class="information card">
          <div>
            <h3 class="profil-h3">Användarnamn:</h3>
            <p id="card-username"></p>
          </div>
          <div>
            <h3 class="profil-h3">Email:</h3>
            <p id="card-email"></p>
          </div>
        </div>
        <div class="edit-information">
          <h3 class="profil-h3-bold">Uppdatera din profil</h3>
          <form id="updateForm" action="" autocomplete="off" novalidate>
            <label class="label" for="username">Användarnamn</label>
            <input
              class="input"
              type="text"
              id="username"
              name="username"
              minlength="2"
              placeholder="Ange nytt användarnamn"
            />
            <label class="label" for="username">Email</label>
            <input
              class="input"
              type="email"
              id="email"
              name="email"
              placeholder="Ange ny email"
            />
            <label class="label" for="password1">Nytt lösenord</label>
            <div class="input-div">
              <input
                class="toggle-password1"
                placeholder="Ange nytt lösenord"
                type="password"
                id="password1"
                name="password"
                minlength="10"
                maxlength="20"
              />
              <img
                src="./img/eye-closed.svg"
                class="eye-icon1"
                alt="Öga blundar"
              />
            </div>
            <label class="label" for="password2">Nytt lösenord igen</label>
            <div class="input-div">
              <input
                class="toggle-password2"
                placeholder="Ange nytt lösenord igen"
                type="password"
                id="password2"
                name="password2"
                minlength="10"
                maxlength="20"
              />
              <img
                src="./img/eye-closed.svg"
                class="eye-icon2"
                alt="Öga blundar"
              />
            </div>
            <button class="button" type="submit">
              Spara mina profiluppgifter
            </button>
          </form>
          <button id="delete-button">Radera mina profiluppgifter</button>
          <p class="error-message"></p>
        </div>
      </div>
    </main>
    <footer id="footerContainer"></footer>
  </body>
</html>
